global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: psem-app
    # App runs natively on host; scrape via host-gateway
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
